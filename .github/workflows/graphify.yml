name: Graphify
on:
  push:
    branches: [main]
    paths: ['agents/**', 'src/**']
  workflow_dispatch:

jobs:
  build-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install graphifyy
      - run: graphify update . --output graphify-out/
      - uses: actions/upload-artifact@v4
        with:
          name: graphify-out
          path: graphify-out/
