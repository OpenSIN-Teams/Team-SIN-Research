name: 🐛 Bug Report
description: Report a bug or unexpected behavior in OpenSIN
title: "[BUG] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the sections below to help us understand and fix the issue.
        
        Before submitting, please check:
        - You're using the latest version
        - This issue hasn't already been reported
        - This is a bug, not a feature request or support question
        
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      description: Please confirm before submitting
      options:
        - label: I have searched existing issues and this hasn't been reported yet
          required: true
        - label: This is a single bug report (please file separate reports for different bugs)
          required: true
        - label: I am using the latest version
          required: true
          
  - type: textarea
    id: actual
    attributes:
      label: What's Wrong?
      description: Describe what's happening that shouldn't be
      placeholder: Describe the bug...
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: What Should Happen?
      description: Describe the expected behavior
      placeholder: Describe expected behavior...
    validations:
      required: true
      
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide clear, numbered steps to reproduce the issue
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true
      
  - type: dropdown
    id: regression
    attributes:
      label: Is this a regression?
      options:
        - "Yes, this worked before"
        - "No, this never worked"
        - "I don't know"
    validations:
      required: true
      
  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you using?
      placeholder: "e.g., 1.0.0"
    validations:
      required: true
      
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows
        - Docker/Container
        - Cloud (HF/OCI)
        - Other
    validations:
      required: true
      
  - type: textarea
    id: logs
    attributes:
      label: Error Messages/Logs
      description: Paste any error output or logs
      render: shell
    validations:
      required: false
      
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, config files, or any other context
    validations:
      required: false
